kind = "web"
previewPath = "/"
title = "EFFF Club Dashboard"
version = "1.0.0"
id = "artifacts/efff-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20335

[services.development]
run = "pnpm --filter @workspace/efff-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/efff-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/efff-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20335"
BASE_PATH = "/"
